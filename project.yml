name: BearTraining
options:
  bundleIdPrefix: thorbjxrn
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: 228DC29L7W
    SWIFT_VERSION: "6.0"

targets:
  BearTraining:
    type: application
    platform: iOS
    sources:
      - path: BearTraining
        excludes:
          - "Preview Content/**"
    resources:
      - path: BearTraining/Assets.xcassets
      - path: BearTraining/Preview Content
        optional: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: BearTraining/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Bear Training
        CODE_SIGN_ENTITLEMENTS: BearTraining/BearTraining.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: thorbjxrn.BearTraining
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_LIVE_ACTIVITIES: YES
    entitlements:
      path: BearTraining/BearTraining.entitlements

  BearTrainingTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BearTrainingTests
    dependencies:
      - target: BearTraining
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: thorbjxrn.BearTrainingTests
        GENERATE_INFOPLIST_FILE: YES
