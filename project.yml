name: Stronq
options:
  bundleIdPrefix: thorbjxrn
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: 228DC29L7W
    SWIFT_VERSION: "6.0"

schemes:
  Stronq:
    build:
      targets:
        Stronq: all
        StronqLiveActivity: all
    run:
      config: Debug

targets:
  Stronq:
    type: application
    platform: iOS
    sources:
      - path: Stronq
        excludes:
          - "Preview Content/**"
      - path: Shared
    resources:
      - path: Stronq/Assets.xcassets
      - path: Stronq/Preview Content
        optional: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Stronq/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Stronq
        CODE_SIGN_ENTITLEMENTS: Stronq/Stronq.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: thorbjxrn.Stronq
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_LIVE_ACTIVITIES: YES
    dependencies:
      - target: StronqLiveActivity
    entitlements:
      path: Stronq/Stronq.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []

  StronqLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: StronqLiveActivity
        excludes:
          - "Info.plist"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: thorbjxrn.Stronq.LiveActivity
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: StronqLiveActivity/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  StronqTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StronqTests
    dependencies:
      - target: Stronq
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: thorbjxrn.StronqTests
        GENERATE_INFOPLIST_FILE: YES
