<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" fill="#F5F3F0"/>

  <!-- Left barbell -->
  <!-- Collar -->
  <rect x="120" y="483" rx="8" ry="8" width="30" height="58" fill="#8B6D45"/>
  <!-- Bar left -->
  <rect x="150" y="500" rx="4" ry="4" width="80" height="24" fill="#8B6D45" opacity="0.5"/>
  <!-- Plate 1 (outer) -->
  <rect x="195" y="360" rx="14" ry="14" width="36" height="304" fill="#8B6D45"/>
  <!-- Plate 2 (inner) -->
  <rect x="240" y="330" rx="14" ry="14" width="36" height="364" fill="#8B6D45"/>

  <!-- Bar center left -->
  <rect x="276" y="500" rx="4" ry="4" width="100" height="24" fill="#8B6D45" opacity="0.5"/>

  <!-- Q letter -->
  <circle cx="512" cy="470" r="130" stroke="#8B6D45" stroke-width="48" fill="none"/>
  <!-- Q tail -->
  <rect x="488" y="560" rx="6" ry="6" width="48" height="180" fill="#8B6D45"/>

  <!-- Bar center right -->
  <rect x="648" y="500" rx="4" ry="4" width="100" height="24" fill="#8B6D45" opacity="0.5"/>

  <!-- Right barbell -->
  <!-- Plate 2 (inner) -->
  <rect x="748" y="330" rx="14" ry="14" width="36" height="364" fill="#8B6D45"/>
  <!-- Plate 1 (outer) -->
  <rect x="793" y="360" rx="14" ry="14" width="36" height="304" fill="#8B6D45"/>
  <!-- Bar right -->
  <rect x="794" y="500" rx="4" ry="4" width="80" height="24" fill="#8B6D45" opacity="0.5"/>
  <!-- Collar -->
  <rect x="874" y="483" rx="8" ry="8" width="30" height="58" fill="#8B6D45"/>
</svg>
